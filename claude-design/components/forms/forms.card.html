<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--color-surface); }
  .glabel { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 10px; display: block; }
  .field { margin-bottom: 20px; }
  .row { display: flex; gap: 10px; align-items: flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select } = window.ModrexDesignSystem_708df2;
  function Ic({ name, size = 14 }) {
    const node = lucide[name] || [];
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {node.map(([t, a], i) => React.createElement(t, { key: i, ...a }))}
      </svg>
    );
  }
  function Demo() {
    const [q, setQ] = React.useState('Civilian Heat');
    const [path, setPath] = React.useState('C:\\Steam\\steamapps\\common\\PAYDAY 3');
    const [sort, setSort] = React.useState('downloads');
    const [cat, setCat] = React.useState('');
    return (
      <div>
        <div className="field">
          <span className="glabel">Input — search, clearable</span>
          <Input value={q} onChange={setQ} placeholder="Search mods…" icon={<Ic name="Search" />} clearable />
        </div>
        <div className="field">
          <span className="glabel">Input — mono path</span>
          <Input value={path} onChange={setPath} mono />
        </div>
        <div className="field">
          <span className="glabel">Select</span>
          <div className="row">
            <Select value={sort} onChange={setSort} options={[
              { value: 'bumped_at', label: 'Last Updated' },
              { value: 'downloads', label: 'Most Downloaded' },
              { value: 'likes', label: 'Most Liked' },
              { value: 'name', label: 'Name' },
            ]} />
            <Select value={cat} onChange={setCat} placeholder="All categories" options={[
              { value: '', label: 'All categories' },
              { value: '1', label: 'Gameplay' },
              { value: '2', label: 'UI' },
              { value: '3', label: 'Audio' },
            ]} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
