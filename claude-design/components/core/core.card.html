<!-- @dsCard group="Components" viewport="700x420" name="Core — buttons, toggles, badges" subtitle="Button · IconButton · Toggle · Badge" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--color-surface); }
  .group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .group:last-child { margin-bottom: 0; }
  .glabel { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); font-family: var(--font-mono); }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Toggle, Badge } = window.ModrexDesignSystem_708df2;

  function Ic({ name, size = 14, strokeWidth = 2 }) {
    const node = lucide[name] || [];
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth={strokeWidth}
        strokeLinecap="round" strokeLinejoin="round">
        {node.map(([tag, attrs], i) => React.createElement(tag, { key: i, ...attrs }))}
      </svg>
    );
  }

  function Demo() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(false);
    return (
      <div>
        <div className="group">
          <span className="glabel">Button — variants</span>
          <div className="row">
            <Button variant="primary" icon={<Ic name="Download" />}>Install</Button>
            <Button variant="secondary" icon={<Ic name="Play" />}>Launch without mods</Button>
            <Button variant="ghost">Later</Button>
            <Button variant="accent-soft" icon={<Ic name="RefreshCw" />}>Update</Button>
            <Button variant="danger" icon={<Ic name="Trash2" />}>Remove</Button>
          </div>
        </div>
        <div className="group">
          <span className="glabel">Button — size md · loading · disabled</span>
          <div className="row">
            <Button variant="primary" size="md" icon={<Ic name="FolderOpen" size={16} />}>Browse</Button>
            <Button variant="primary" loading>Installing</Button>
            <Button variant="primary" disabled icon={<Ic name="Download" />}>Install</Button>
          </div>
        </div>
        <div className="group">
          <span className="glabel">IconButton</span>
          <div className="row">
            <IconButton title="Refresh"><Ic name="RefreshCw" /></IconButton>
            <IconButton variant="solid" title="Open folder"><Ic name="FolderOpen" /></IconButton>
            <IconButton variant="danger" title="Remove"><Ic name="Trash2" /></IconButton>
            <IconButton title="Dismiss"><Ic name="X" /></IconButton>
          </div>
        </div>
        <div className="group">
          <span className="glabel">Toggle · Badge</span>
          <div className="row">
            <Toggle checked={a} onChange={setA} />
            <Toggle checked={b} onChange={setB} />
            <Toggle checked={false} disabled />
            <span style={{width:'12px'}} />
            <Badge variant="success">Installed</Badge>
            <Badge variant="warning">File missing</Badge>
            <Badge variant="accent">Required</Badge>
            <Badge variant="danger">Broken archive</Badge>
            <Badge variant="neutral">2 files</Badge>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
