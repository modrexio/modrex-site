<!-- @dsCard group="Components" viewport="700x360" name="Feedback — banner, progress, modal" subtitle="Banner · ProgressBar · Modal" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 0; background: var(--color-surface); }
  .frame { position: relative; min-height: 360px; }
  .stack { display: flex; flex-direction: column; }
  .pad { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .glabel { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); font-family: var(--font-mono); }
  .card-demo { background: var(--color-surface-raised); border: 1px solid var(--color-border); border-radius: 8px; overflow: hidden; }
  .card-demo .meta { padding: 10px 12px; font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Banner, ProgressBar, Modal, Button } = window.ModrexDesignSystem_708df2;
  function Ic({ name, size = 14 }) {
    const node = lucide[name] || [];
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {node.map(([t, a], i) => React.createElement(t, { key: i, ...a }))}
      </svg>
    );
  }
  function Demo() {
    const [open, setOpen] = React.useState(false);
    return (
      <div className="frame">
        <div className="stack">
          <Banner variant="danger" action={<button className="mdx-icon-btn" style={{color:'var(--color-danger-text)'}} title="Dismiss"><Ic name="X" size={14} /></button>}>
            Failed to launch PAYDAY 3 — executable not found.
          </Banner>
          <Banner variant="warning" action={<button style={{fontSize:12,padding:'4px 12px',borderRadius:'var(--radius-sm)',border:'none',background:'rgba(250,204,21,0.2)',color:'var(--color-warning)',transition:'var(--transition-colors)'}}>Restore mods</button>}>
            Mods are hidden — the game was launched in vanilla mode and may still be running.
          </Banner>
          <Banner variant="info" action={<Button variant="primary">Review updates</Button>}>
            3 mods can be updated.
          </Banner>
        </div>
        <div className="pad">
          <span className="glabel">ProgressBar — determinate & indeterminate</span>
          <div className="card-demo">
            <div className="meta">Civilian Heat Overhaul — downloading</div>
            <ProgressBar percent={62} />
          </div>
          <div className="card-demo">
            <div className="meta">Resolving archive…</div>
            <ProgressBar />
          </div>
          <span className="glabel">Modal</span>
          <div><Button variant="primary" icon={<Ic name="Download" />} onClick={() => setOpen(true)}>Open dialog</Button></div>
        </div>
        <Modal open={open} onClose={() => setOpen(false)} title="What's new in v0.9.1"
          footer={<>
            <Button variant="secondary" onClick={() => setOpen(false)}>Later</Button>
            <Button variant="accent-soft" icon={<Ic name="Download" />}>Update</Button>
          </>}>
          Adds Epic Games auto-detection, faster archive scanning, and fixes a crash when installing multi-pak mods.
        </Modal>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
