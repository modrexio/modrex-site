<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-surface); display: flex; align-items: center; gap: 40px; }
  .panel { display: flex; align-items: center; gap: 16px; }
  img { display: block; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 10px; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="col">
    <img src="../assets/logo.png" alt="Modrex wordmark" style="height:88px" />
    <span class="cap">logo.png — full wordmark</span>
  </div>
  <div class="col">
    <img src="../assets/icon.png" alt="Modrex MR monogram" style="height:96px" />
    <span class="cap">icon.png — app / favicon</span>
  </div>
</body>
</html>
