<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — micro-gaps for a dense UI" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--color-accent); border-radius: 2px; width: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="lbl">1 · 4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="lbl">2 · 8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="lbl">3 · 12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lbl">4 · 16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lbl">6 · 24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lbl">8 · 32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lbl">12 · 48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lbl">16 · 64</span></div>
  </div>
</body>
</html>
