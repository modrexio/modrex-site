<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Near-black ramp — raises lighter" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-lg); border: 1px solid var(--color-border); }
  .name { font-size: 12px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-surface)"></div><span class="name">surface</span><span class="hex">#131313</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-raised)"></div><span class="name">surface-raised</span><span class="hex">#1c1c1c</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-hover)"></div><span class="name">surface-hover</span><span class="hex">#262626</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-active)"></div><span class="name">surface-active</span><span class="hex">#333333</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-light)"></div><span class="name">surface-light</span><span class="hex">#464646</span></div>
  </div>
</body>
</html>
