<!-- @dsCard group="Colors" viewport="700x150" name="Accent" subtitle="The one loud color — Modrex orange" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-surface); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .big { flex: 1; border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 92px; }
  .lbl { font-size: 12px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
  .tints { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .tint { flex: 1; border-radius: var(--radius-sm); display: flex; align-items: center; padding: 0 10px; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); border: 1px solid var(--color-border); }
</style>
</head>
<body>
  <div class="row">
    <div class="big" style="background:var(--color-accent); color:#fff;">
      <span class="lbl">accent</span><span class="hex">#e36300</span>
    </div>
    <div class="big" style="background:var(--color-accent-bright); color:#1a0c00;">
      <span class="lbl">accent-bright · hover</span><span class="hex">#f87d36</span>
    </div>
    <div class="tints">
      <div class="tint" style="background:var(--accent-tint-10)">accent / 10%</div>
      <div class="tint" style="background:var(--accent-tint-20)">accent / 20%</div>
      <div class="tint" style="background:var(--accent-tint-30)">accent / 30%</div>
    </div>
  </div>
</body>
</html>
