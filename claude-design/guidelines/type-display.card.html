<!-- @dsCard group="Type" viewport="700x190" name="Display — Bebas Neue" subtitle="Wordmark & big numerals only" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface); }
  .wm { font-family: var(--font-display); letter-spacing: 0.05em; line-height: 1; font-size: 76px; }
  .wm .rex { color: var(--color-accent); }
  .row { display: flex; align-items: flex-end; gap: 28px; margin-top: 14px; }
  .num { font-family: var(--font-display); letter-spacing: 0.04em; color: var(--color-text); font-size: 44px; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 10px; }
</style>
</head>
<body>
  <div class="wm">MOD<span class="rex">REX</span></div>
  <div class="row">
    <span class="num">0.9.1</span>
    <span class="num" style="color:var(--color-accent-bright)">12.4K</span>
    <span class="num" style="color:var(--text-secondary)">PAYDAY&nbsp;3</span>
  </div>
  <div class="meta">font-display · Bebas Neue · uppercase · tracking 0.05em</div>
</body>
</html>
