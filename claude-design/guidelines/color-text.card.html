<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-surface); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .demo { font-size: 18px; font-weight: 600; width: 320px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="demo" style="color:var(--color-text)">Browse Mods — primary</span><span class="meta">text · #f4f4f3</span></div>
    <div class="line"><span class="demo" style="color:var(--color-text-muted)">by Oleh Shulha — secondary</span><span class="meta">text-muted · #8e8e96</span></div>
    <div class="line"><span class="demo" style="color:var(--color-text-subtle)">12.4k downloads — tertiary</span><span class="meta">text-subtle · #71717a</span></div>
  </div>
</body>
</html>
