<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Small & consistent — modals get the largest" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--color-surface-raised); border: 1px solid var(--color-border); border-top: 2px solid var(--color-accent); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
  .toggle { width: 36px; height: 20px; border-radius: 9999px; background: var(--color-accent); position: relative; }
  .toggle::after { content:''; position:absolute; top:2px; left:18px; width:16px; height:16px; border-radius:9999px; background:#fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><span class="lbl">sm · 4 · buttons/inputs</span></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><span class="lbl">lg · 8 · cards</span></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><span class="lbl">xl · 12 · modals</span></div>
    <div class="item"><div class="toggle"></div><span class="lbl">full · 9999 · toggle</span></div>
  </div>
</body>
</html>
