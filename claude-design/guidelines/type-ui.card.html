<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface); font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 150px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="line"><span class="label">lg · 18 · 600</span><span style="font-size:18px;font-weight:600">Browse Mods</span></div>
  <div class="line"><span class="label">sm · 14 · 600</span><span style="font-size:14px;font-weight:600">Civilian Heat Overhaul</span></div>
  <div class="line"><span class="label">sm · 14 · 400</span><span style="font-size:14px">Drag mods into folders to organize them.</span></div>
  <div class="line"><span class="label">xs · 12 · 500</span><span style="font-size:12px;font-weight:500;color:var(--text-secondary)">by Oleh Shulha</span></div>
  <div class="line"><span class="label">xs · 12 · 400</span><span style="font-size:12px;color:var(--text-tertiary)">Last updated · 3d ago</span></div>
  <div class="line"><span class="label">2xs · 10 · 500</span><span style="font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em">2 files</span></div>
</body>
</html>
