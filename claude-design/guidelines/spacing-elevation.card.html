<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Borders over shadow — only modals lift" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-surface); }
  .row { display: flex; gap: 24px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 150px; height: 80px; background: var(--color-surface-raised); border: 1px solid var(--color-border); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-secondary); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box">card · border only</div><span class="lbl">shadow-none</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)">dropdown</div><span class="lbl">shadow-md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-modal); border-radius:var(--radius-xl)">modal</div><span class="lbl">shadow-modal · over scrim</span></div>
  </div>
</body>
</html>
