<!-- @dsCard group="Modrex App" viewport="1280x800" name="Desktop app" subtitle="Browse · Installed · Detail · Settings — interactive" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Modrex — Desktop App</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #0a0a0a; }
  /* App window — Tauri desktop frame on a neutral backdrop */
  #frame {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 0;
  }
  #window {
    width: 1280px; height: 800px; overflow: hidden;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-modal);
  }
  #window > div { height: 100%; }

  /* Sidebar nav items — class-driven so active state reconciles cleanly */
  .app-nav {
    display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px;
    border-radius: var(--radius-sm); border: none; font-size: 14px; text-align: left;
    background: transparent; color: var(--text-secondary);
    transition: var(--transition-colors); cursor: pointer;
  }
  .app-nav:hover { background: var(--color-surface-hover); color: var(--color-text); }
  .app-nav.is-active, .app-nav.is-active:hover { background: var(--color-surface-active); color: var(--color-text); }
  .app-nav--collapse { padding: 6px 8px; font-size: 12px; color: var(--text-tertiary); }
  .app-nav--collapse:hover { background: var(--color-surface-hover); color: var(--color-text); }
</style>
</head>
<body>
<div id="frame"><div id="window"><div id="root"></div></div></div>

<!-- Iconographic splash for the offline bundler -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="20" fill="#131313"/>
    <text x="50" y="62" font-family="Bebas Neue, sans-serif" font-size="34" text-anchor="middle" letter-spacing="1">
      <tspan fill="#f4f4f3">M</tspan><tspan fill="#e36300">R</tspan>
    </text>
  </svg>
</template>

<script>
const DS_FILES = [
  '../../components/core/Button.jsx',
  '../../components/core/IconButton.jsx',
  '../../components/core/Toggle.jsx',
  '../../components/core/Badge.jsx',
  '../../components/forms/Input.jsx',
  '../../components/forms/Select.jsx',
  '../../components/feedback/Banner.jsx',
  '../../components/feedback/ProgressBar.jsx',
  '../../components/feedback/Modal.jsx',
  '../../components/display/Card.jsx',
];
const DS_NAMES = ['Button','IconButton','Toggle','Badge','Input','Select','Banner','ProgressBar','Modal','Card'];
const SCREEN_FILES = ['icons.jsx','Chrome.jsx','ModCard.jsx','BrowseScreen.jsx','DetailScreen.jsx','SettingsScreen.jsx','App.jsx'];

async function boot() {
  let src = '';
  for (const f of DS_FILES) {
    let t = await (await fetch(f)).text();
    t = t.replace(/^\s*import[^\n]*\n/gm, '').replace(/export\s+function/g, 'function');
    src += '\n' + t + '\n';
  }
  src += `\nwindow.ModrexDesignSystem_708df2 = { ${DS_NAMES.join(', ')} };\n`;
  for (const f of SCREEN_FILES) {
    src += '\n' + (await (await fetch(f)).text()) + '\n';
  }
  const code = Babel.transform(src, { presets: ['react'] }).code;
  eval(code);
  window.mountApp(document.getElementById('root'));
}
boot();
</script>
</body>
</html>
